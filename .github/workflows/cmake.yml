name: CMake

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Version tag (e.g., v1.0.0) - optional for builds'
        required: false
        type: string

env:
  BUILD_TYPE: Release

jobs:
  call-node-workflow:
    uses: ./.github/workflows/node.js.yml
  build:
    needs: call-node-workflow
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        GP2040_BOARDCONFIG:
          [Fightboard-v3,
          Fightboard-v3-m,
          Fightboard-v3-b,
          Fightboard-v3-b-m,
          Springboard]

    steps:
    #Global Setup
    - name: Checkout GP2040-CE
      uses: actions/checkout@v4.1.1
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup SDK pipeline
      uses: Fortinbra/RaspberryPiPicoBuild@v3

    - name: Download a Build Artifact
      uses: actions/download-artifact@v4.1.2
      with:
        name: fsData
        path: ${{github.workspace}}/lib/httpd/

    - name: Get core count
      id: core_count
      run : cat /proc/cpuinfo  | grep processor | wc -l

    - name: Get short commit hash
      id: git_hash
      shell: bash
      run: echo "SHORT_SHA=$(git describe --always --abbrev=7)" >> $GITHUB_OUTPUT

    - name: Set version from tag
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
          TAG="${{ github.event.inputs.tag_name }}"
        elif [ "${{ github.event_name }}" = "push" ]; then
          TAG="${GITHUB_REF#refs/tags/}"
        else
          TAG=""
        fi
        if [ -n "$TAG" ]; then
          sed -i "s/^set(GIT_REPO_VERSION \".*\")/set(GIT_REPO_VERSION \"$TAG\")/" CMakeLists.txt
        fi
      #End Global Setup

    - name: Pico Build Configure CMake
      shell: bash
      if: ${{ matrix.GP2040_BOARDCONFIG != 'PicoW'}}
      run: PICO_SDK_PATH=${{github.workspace}}/pico-sdk GP2040_BOARDCONFIG=${{ matrix.GP2040_BOARDCONFIG }} SKIP_WEBBUILD=TRUE cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: PicoW Build Configure CMake
      shell: bash
      if: ${{ matrix.GP2040_BOARDCONFIG == 'PicoW'}}
      run: PICO_SDK_PATH=${{github.workspace}}/pico-sdk GP2040_BOARDCONFIG=${{ matrix.GP2040_BOARDCONFIG }} SKIP_WEBBUILD=TRUE cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DPICO_BOARD=pico_w

    - name: Pico Build
      shell: bash
      run: GP2040_BOARDCONFIG=${{ matrix.GP2040_BOARDCONFIG }} cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --parallel ${{steps.core_count.outputs.output}}

    - name: Upload Pico Artifact
      uses: actions/upload-artifact@v4.3.1
      with:
        name: GP2040-CE - ${{ steps.git_hash.outputs.SHORT_SHA }} - ${{ matrix.GP2040_BOARDCONFIG }}
        path: ${{github.workspace}}/build/GP2040-CE_*_${{ matrix.GP2040_BOARDCONFIG }}.uf2
        if-no-files-found: error

    - name: Upload .elf Artifact
      if: ${{ matrix.GP2040_BOARDCONFIG == 'Pico'}}
      uses: actions/upload-artifact@v4.3.1
      with:
        name: elf - ${{ steps.git_hash.outputs.SHORT_SHA }}
        path: ${{github.workspace}}/build/GP2040-CE_*_${{ matrix.GP2040_BOARDCONFIG }}.elf
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.tag_name != '')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.2
        with:
          path: ./artifacts

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log ${PREV_TAG}..${TAG_NAME} --pretty=format:"* %s (%h)" >> notes.md
          else
            echo "## Initial Release" > notes.md
          fi

      - name: Check if pre-release
        id: prerelease
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          if echo "$TAG_NAME" | grep -qE '(alpha|beta|rc|pre)'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: notes.md
          files: |
            ./artifacts/**/*.uf2
            ./artifacts/**/*.elf
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
